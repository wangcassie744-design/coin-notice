name: 纪念币公告定时提醒
on:
  schedule:
    - cron: '0 */1 * * *'  # 每小时一次
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install feedparser requests

      - name: 抓取公告并发送钉钉
        run: |
          python - << 'EOF'
          import feedparser
          import requests
          from datetime import datetime, timedelta

          # ===================== 配置 =====================
          DINGTALK_WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=f24dfc9408ba6588956798311e637c66c248032c6b93f308b9843a59da75b008"
          # 央行官方纪念币公告 RSS（100% 稳定）
          RSS_URL = "https://www.pbc.gov.cn/goutongjiaoliu/146984/146990/index.rss"
          # =================================================

          # 抓取数据（官方源无需复杂请求头）
          try:
              feed = feedparser.parse(RSS_URL)
          except Exception as e:
              print(f"网络请求失败: {e}")
              exit()

          if feed.bozo:
              print("RSS 解析失败")
              exit()

          # 只发送最近1小时内、包含「纪念币」关键词的新公告
          one_hour_ago = datetime.now() - timedelta(hours=1)

          for entry in feed.entries[:5]:
              try:
                  pub_time = datetime(*entry.published_parsed[:6])
                  if pub_time >= one_hour_ago and "纪念币" in entry.title:
                      message = {
                          "msgtype": "text",
                          "text": {
                              "content": f"【纪念币新公告】\n标题：{entry.title}\n链接：{entry.link}"
                          }
                      }
                      requests.post(DINGTALK_WEBHOOK, json=message)
                      print("已发送：" + entry.title)
              except Exception as e:
                  print(f"处理条目失败: {e}")
                  continue
          EOF
