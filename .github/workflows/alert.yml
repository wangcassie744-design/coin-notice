name: 纪念币公告定时提醒
on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 抓取最新纪念币公告
        run: |
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import os

          DINGTALK_WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=f24dfc9408ba6588956798311e637c66c248032c6b93f308b9843a59da75b008"
          URL = "https://www.chngc.net/common/news"
          FILE_PATH = "/tmp/last_notice.txt"

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }

          # 获取页面
          try:
              res = requests.get(URL, headers=headers, timeout=10)
              res.encoding = "utf-8"
              soup = BeautifulSoup(res.text, "html.parser")
          except Exception as e:
              content = "纪念币：获取公告失败"
              requests.post(DINGTALK_WEBHOOK, json={"msgtype": "text", "text": {"content": content}})
              exit()

              # 查找公告
          items = soup.find_all("li", class_="clearfix")
          latest_title = None
          latest_link = None

          for item in items[:10]:
              try:
                  a = item.find("a")
                  title = a.get_text(strip=True)
                  if "纪念币" in title:
                      latest_title = title
                      latest_link = "https://www.chngc.net" + a["href"]
                      break
              except:
                  continue

          # 上次记录
          last_sent = ""
          if os.path.exists(FILE_PATH):
              with open(FILE_PATH, "r", encoding="utf-8") as f:
                  last_sent = f.read().strip()

          current_info = f"{latest_title}|{latest_link}" if latest_title else ""

          # 构造消息（必带关键词“纪念币”）
          if latest_title and current_info != last_sent:
              content = f"【纪念币公告有更新】\n标题：{latest_title}\n链接：{latest_link}"
              with open(FILE_PATH, "w", encoding="utf-8") as f:
                  f.write(current_info)
          else:
              content = "纪念币：暂无公告更新"

          # 发送
          requests.post(DINGTALK_WEBHOOK, json={
              "msgtype": "text",
              "text": {"content": content}
          })
          print("发送内容：", content)
          EOF
