name: 纪念币公告定时提醒
on:
  schedule:
    - cron: '0 */1 * * *'  # 每小时一次
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 抓取公告并发送钉钉
        run: |
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          import re

          # ===================== 配置 =====================
          DINGTALK_WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=f24dfc9408ba6588956798311e637c66c248032c6b93f308b9843a59da75b008"
          NOTICE_URL = "https://www.chngc.net/common/news"
          # =================================================

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Referer": "https://www.chngc.net/"
          }

          try:
              response = requests.get(NOTICE_URL, headers=headers, timeout=15)
              response.encoding = "utf-8"
              
              if response.status_code != 200:
                  print("访问失败")
                  exit()

              soup = BeautifulSoup(response.text, "html.parser")
              news_list = soup.find_all("li", class_="clearfix")

              print(f"共找到 {len(news_list)} 条公告")

              # 收集最新10条【纪念币】相关公告
              count = 0
              for news in news_list:
                  if count >= 10:
                      break
                      
                  try:
                      title_tag = news.find("a")
                      title = title_tag.get_text(strip=True)
                      link = "https://www.chngc.net" + title_tag["href"]

                      # 只发送包含纪念币的内容
                      if "纪念币" in title or "贵金属" in title or "发行" in title:
                          message = {
                              "msgtype": "text",
                              "text": {
                                  "content": f"【纪念币公告】\n标题：{title}\n链接：{link}"
                              }
                          }
                          requests.post(DINGTALK_WEBHOOK, json=message)
                          print(f"已发送：{title}")
                          count += 1

                  except Exception as e:
                      continue

              print(f"本次共发送 {count} 条纪念币公告")

          except Exception as e:
              print(f"错误：{e}")
              exit()
          EOF
