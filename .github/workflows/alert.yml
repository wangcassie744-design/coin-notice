name: 纪念币公告定时提醒
on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install feedparser requests

      - name: 抓取公告并发送钉钉
        run: |
          python - << 'EOF'
          import requests

          # ===================== 测试：直接发消息 =====================
          DINGTALK_WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=f24dfc9408ba6588956798311e637c66c248032c6b93f308b9843a59da75b008"
          
          message = {
              "msgtype": "text",
              "text": {
                  "content": "【测试】纪念币提醒程序运行正常！"
              }
          }
          requests.post(DINGTALK_WEBHOOK, json=message)
          print("测试消息已发送")
          EOF
